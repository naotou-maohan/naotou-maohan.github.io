baseURL = "https://naotou-maohan.github.io/"
languageCode = "zh-cn"
title = "我的博客"
theme = "PaperMod"

[pagination]
pagerSize = 10

[params]
ShowReadingTime = true
ShowShareButtons = true
ShowCodeCopyButtons = true
ShowToc = true
        
params:
  profileMode:
    enabled: true
    title: "<Title>" # optional default will be site title
    subtitle: "This is subtitle"
    imageUrl: "<image link>" # optional
    imageTitle: "<title of image as alt>" # optional
    imageWidth: 120 # custom size
    imageHeight: 120 # custom size
    buttons:
      - name: Archive
        url: "/archive"
      - name: Github
        url: "https://github.com/"

  socialIcons: # optional
    - name: "<platform>"
      url: "<link>"
    - name: "<platform 2>"
      url: "<link2>"
      
[params.profileMode]
enabled = true
title = "Hi there"
subtitle = "通信 | 电子 | 编程 | 学习记录"

[[params.profileMode.buttons]]
name = "文章"
url = "posts"

[[params.profileMode.buttons]]
name = "关于"
url = "about"

[[params.socialIcons]]
name = "posts/hello.md"
url = "https://github.com/"